<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASA Astronomy Picture of the Day</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: transparent;
    font-family: Inter, system-ui, sans-serif;
    color: white;
}

.widget {
    width: 100%;
    max-width: 600px;
    margin: auto;
    border-radius: 16px;
    overflow: hidden;
    background: #0b1020;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
}

.image-link {
    display: block;
    text-decoration: none;
}

.image-link img {
    width: 100%;
    display: block;
    aspect-ratio: 16/9;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.image-link:hover img {
    transform: scale(1.02);
}

.info {
    padding: 14px;
}

.title {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
}

.date {
    font-size: 0.8rem;
    color: #9aa4c3;
}

.credit {
    font-size: 0.75rem;
    color: #7180a8;
    margin-top: 8px;
}
</style>
</head>

<body>

<div class="widget">
    <a id="apodLink"
       class="image-link"
       href="#"
       target="_blank"
       rel="noopener noreferrer">

        <img id="apodImage"
             src=""
             alt="Astronomy Picture of the Day">
    </a>

    <div class="info">
        <div class="title" id="apodTitle">
            Loading today's image...
        </div>

        <div class="date" id="apodDate"></div>

        <div class="credit">
            NASA Astronomy Picture of the Day
        </div>
    </div>
</div>

<script>
async function loadAPOD() {
    try {
        const response = await fetch(
            "https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY"
        );

        const data = await response.json();

        if (data.media_type !== "image") {
            document.getElementById("apodTitle").textContent =
                "Today's APOD is a video. Click to view.";
            document.getElementById("apodLink").href = data.url;
            return;
        }

        document.getElementById("apodImage").src = data.url;
        document.getElementById("apodTitle").textContent = data.title;
        document.getElementById("apodDate").textContent = data.date;

        document.getElementById("apodLink").href =
            "https://apod.nasa.gov/apod/";

    } catch (error) {
        document.getElementById("apodTitle").textContent =
            "Unable to load APOD";
    }
}

loadAPOD();
</script>

</body>
</html>
